name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-router:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install router package
        run: python -m pip install -e ".[dev]"

      - name: Run router test suite
        run: python -m pytest tests -q

  test-validator:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: validator
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: validator/pyproject.toml

      - name: Install validator package
        run: python -m pip install -e ".[dev]"

      - name: Run validator test suite
        run: python -m pytest -q

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (type-checks via tsc)
        run: npm run build

      - name: Lint
        run: npm run lint
