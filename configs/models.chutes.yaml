# Chutes pool config for minirouter.
# Same logical pool names as the Fireworks default, but routed through
# Chutes' OpenAI-compatible API.

providers:
  chutes:
    base_url: "https://llm.chutes.ai/v1"
    api_key_env: "CHUTES_API_KEY"
    timeout_s: 180
    max_retries: 10
    max_concurrency: 8
    reasoning_param: null

pool:
  - name: deepseek-v4-pro
    provider: chutes
    id: "deepseek-ai/DeepSeek-V3.2-TEE"
  - name: glm-5p2
    provider: chutes
    id: "zai-org/GLM-5.2-TEE"
  - name: kimi-k2p6
    provider: chutes
    id: "moonshotai/Kimi-K2.6-TEE"

decoding:
  thinker:   { temperature: 0.7, top_p: 0.95, max_tokens: 4096 }
  worker:    { temperature: 0.2, top_p: 0.95, max_tokens: 4096 }
  verifier:  { temperature: 0.0, top_p: 1.0,  max_tokens: 2048 }
