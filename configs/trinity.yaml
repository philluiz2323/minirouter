# Coordinator + evolutionary-training config.
# Values below are grounded in docs/SPEC.md §0 (authoritative): verified against the
# real Qwen3-0.6B config and corrected by the adversarial review. [OUR CHOICE] tags
# mark decisions the paper left unspecified — see docs/SPEC.md §10 for rationale.

coordinator:
  encoder_model: "Qwen/Qwen3-0.6B"     # CONFIRMED: hidden_size=1024, 28 layers
  device: "cuda:0"                      # physical GPU 5 via CUDA_VISIBLE_DEVICES=5
  dtype: "bfloat16"
  hidden_state:
    layer: -1                           # final hidden layer
    token: "penultimate"                # index -2 (NOT EOS; last-token collapses LCB >10pts)
    pool: "none"
    l2_normalize: true                  # [OUR CHOICE] stabilizes logit scale vs sigma0 (SPEC §0.3.2)

  head:
    type: "linear"                      # z = W h, no bias (best overall, Table 3)
    hidden_dim: 0                       # pure linear
    n_models: 3                         # L = pool size
    n_roles: 3                          # Thinker, Worker, Verifier
    n_a: 6                              # = L + 3 ; head W in R^{6 x 1024} = 6144 params
    include_stop_action: false          # termination is implicit (Verifier ACCEPT or K reached)
    factorize: "two_softmax"            # softmax over agent logits[0:3] and role logits[3:6] separately

  svf:                                  # Singular Value Fine-tuning (Transformer^2)
    enabled: true
    target_layer: 26                    # second-to-last of 28 (0-indexed)
    matrices: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]  # all 7 linear mats
    init_scale: 1.0                     # identity start -> SLM unmodified at init
    expected_scale_count: 7168          # = 7 x 1024 [OUR CHOICE]; paper says 9216 (=9x1024) which
                                        # does not map onto Qwen3's 7 matrices. SMOKE TEST S2 must
                                        # print the actual count and assert it equals what we pack.

params:
  total_dim_n: 13312                    # 6144 (head) + 7168 (SVF) — the CMA-ES search dimension

session:
  max_turns: 5                          # K = B_turn
  budget_tokens: null
  final_answer: "O_tau"                 # output of the terminating turn
  verifier_requires_prior_worker: true  # [OUR CHOICE] turn-1 Verifier cannot ACCEPT empty (SPEC §0.3.5)
  first_turn_role: "free"               # no forced T->W->V ordering
  request_timeout_s: null               # per-LLM request timeout; set for quick fail-fast smoke runs
  trajectory_timeout_s: null            # wall-clock timeout for one task trajectory

# Separable CMA-ES (diagonal covariance). Hyperparameters per SPEC §0.2 / §5.
sep_cmaes:
  population_size: 33                   # lambda = ceil(4 + 3 ln 13312) = 33  (corrected from 34)
  mu: 16                                # floor(lambda/2)
  recombination_weights: "log"          # default log-weights, normalized
  sigma0: 0.1                           # [OUR CHOICE]; rely on h L2-norm to keep logits sane
  generations: 60                       # T ~ 60
  m_cma: 16                             # replications per candidate (distinct task instances)
  init_mean: "head_zero_svf_one"        # W=0 (uniform policy) + SVF scales=1.0
  bounds: null
  seed: 0
  fitness:
    metric: "accuracy"                  # mean binary reward R(tau) in {0,1} over m_cma instances
    cost_penalty: 0.0                   # no explicit length/cost penalty (bounded by 4096 x K)
  budget_b_env: 31680                   # = m_cma * lambda * generations = 16 * 33 * 60

# Training-only fitness shaping (improvement #3). Read by trinity.optim.fitness
# .FitnessConfig.from_dict. DEFAULTS BELOW PRESERVE THE ORIGINAL MEAN-BINARY
# FITNESS EXACTLY (enable_reweight off + zero-effect bonuses collapse to binary).
# INVARIANT: this affects sep-CMA-ES TRAINING fitness ONLY; the eval path
# (trinity.eval / reward.score) stays pure binary correct/incorrect.
fitness:
  enable_reweight: false   # variance-reweight tasks by population disagreement
  format_bonus: 0.05       # reward for producing a parseable answer (any correctness)
  turn_penalty: 0.05       # penalty proportional to (num_turns-1)/(max_turns-1)
  hero_dense: false        # reserved: per-turn dense reward (currently unused)

baselines:                              # for the optimizer comparison (R8)
  enabled: [random_routing, static_best, rl_reinforce, imitation_sft]
  random_search: { sample_range: [-0.5, 0.5], trials_per_candidate: 32 }
  reinforce:     { batch_size: 528, iterations: 60 }   # batch = m_cma * lambda
  sft:           { optimizer: adam, lr: 1.0e-6, batch_size: 64, freeze_slm: true }
