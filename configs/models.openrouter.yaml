# OpenRouter pool config for minirouter.
# Same logical pool names as the Fireworks default, but routed through
# OpenRouter's OpenAI-compatible API.

providers:
  openrouter:
    base_url: "https://openrouter.ai/api/v1"
    api_key_env: "OPENROUTER_API_KEY"
    timeout_s: 180
    max_retries: 10
    max_concurrency: 8
    reasoning_param: "reasoning_effort"
    extra_headers:
      HTTP-Referer: "https://github.com/tmimmanuel/tiny-router-works"
      X-OpenRouter-Title: "minirouter"

pool:
  - name: deepseek-v4-pro
    provider: openrouter
    id: "deepseek/deepseek-v4-pro"
  - name: glm-5p2
    provider: openrouter
    id: "z-ai/glm-5.2"
  - name: kimi-k2p6
    provider: openrouter
    id: "moonshotai/kimi-k2.6"

decoding:
  thinker:   { temperature: 0.7, top_p: 0.95, max_tokens: 4096 }
  worker:    { temperature: 0.2, top_p: 0.95, max_tokens: 4096 }
  verifier:  { temperature: 0.0, top_p: 1.0,  max_tokens: 2048 }
