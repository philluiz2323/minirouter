# Light OpenRouter pool config for minirouter.
# Smaller / cheaper pool for quick evals and smoke runs, still using the
# OpenRouter OpenAI-compatible API.

providers:
  openrouter:
    base_url: "https://openrouter.ai/api/v1"
    api_key_env: "OPENROUTER_API_KEY"
    timeout_s: 60
    max_retries: 3
    max_concurrency: 8
    reasoning_param: "reasoning_effort"
    extra_headers:
      HTTP-Referer: "https://github.com/tmimmanuel/tiny-router-works"
      X-OpenRouter-Title: "minirouter"

pool:
  - name: qwen3-coder-30b
    provider: openrouter
    id: "qwen/qwen3-coder-30b-a3b-instruct"
  - name: gpt-oss-120b
    provider: openrouter
    id: "openai/gpt-oss-120b"
  - name: gemma-3-4b
    provider: openrouter
    id: "google/gemma-3-4b-it"
  - name: nemotron-3-ultra
    provider: openrouter
    id: "nvidia/nemotron-3-ultra-550b-a55b"

decoding:
  thinker:   { temperature: 0.7, top_p: 0.95, max_tokens: 4096 }
  worker:    { temperature: 0.2, top_p: 0.95, max_tokens: 4096 }
  verifier:  { temperature: 0.0, top_p: 1.0,  max_tokens: 2048 }
