# Light Chutes pool config for minirouter.
# Smaller / cheaper pool for quick evals and smoke runs, still using the
# Chutes OpenAI-compatible API.

providers:
  chutes:
    base_url: "https://llm.chutes.ai/v1"
    api_key_env: "CHUTES_API_KEY"
    timeout_s: 60
    max_retries: 3
    max_concurrency: 8
    reasoning_param: null

pool:
  - name: minimax-m2p5
    provider: chutes
    id: "MiniMaxAI/MiniMax-M2.5-TEE"
  - name: gemma4-31b-turbo
    provider: chutes
    id: "google/gemma-4-31B-turbo-TEE"
  - name: qwen3-32b
    provider: chutes
    id: "Qwen/Qwen3-32B-TEE"

decoding:
  thinker:   { temperature: 0.7, top_p: 0.95, max_tokens: 4096 }
  worker:    { temperature: 0.2, top_p: 0.95, max_tokens: 4096 }
  verifier:  { temperature: 0.0, top_p: 1.0,  max_tokens: 2048 }
